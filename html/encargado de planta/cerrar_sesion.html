<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cerrar Sesión</title>

    <!-- CSS del módulo -->
    <link rel="stylesheet" href="../../_css/cerrar-sesion.css">
</head>

<body>

<!-- BARRA SUPERIOR -->
<header class="header-bar">
    <div class="header-rol">Encargado de planta</div>
    <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>

    <div class="header-user">
        <span class="icon"><img src="../../img/campana.png"></span>
        <span>Andres Imbachi</span>
        <span class="icon"><img src="../../img/usuario-gestion.png"></span>
    </div>
</header>

<!-- CONTENEDOR PRINCIPAL -->
<div class="confirm-container">

    <div class="confirm-box">
        <img src="../../img/cerrar-seccion.png" class="icono">

        <h2>¿Deseas cerrar sesión?</h2>
        <p>Tu sesión actual se cerrará y volverás al inicio.</p>

        <div class="botones">
            <!-- Volver al panel -->
            <button class="btn-cancelar" onclick="location.href='panel_control.html'">
                Cancelar
            </button>

            <!-- Cerrar e ir al login -->
            <button class="btn-salir" onclick="location.href='../login/inicio-seccion.html'">
                Cerrar sesión
            </button>
        </div>
    </div>

</div>

<div class="logo-footer">Z-CONTAY</div>

</body>
</html>
