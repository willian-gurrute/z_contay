</head>
<body>

<header class="header-bar">
    <div class="header-rol">Encargado de planta</div>
    <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>
    <div class="header-user">
        <span class="icon"><img src="../../img/campana.png"></span>
        <span>Andres Imbachi</span>
        <span class="icon"><img src="../../img/usuario-gestion.png"></span>
    </div>
</header>

<div class="main-container">

    <nav class="sidebar">
        <ul>
            <li><a href="panel_control.html"><span class="icon"><img src="../../img/panel.jpg"></span> Panel Principal</a></li>
            <li><a href="control_inventario.html"><span class="icon"><img src="../../img/inventario.png"></span> Control de inventario</a></li>
            <li><a href="movimiento_entrada_salida.html"><span class="icon"><img src="../../img/entrada-salida.png"></span> Movimiento Entrada/Salida</a></li>
            <li><a href="gestion_despachos.html"><span class="icon"><img src="../../img/despachos.png"></span> Gestión de Despachos</a></li>
            <li class="active-item"><a href="rutas_entrega.html"><span class="icon"><img src="../../img/rutas.png"></span> Rutas de Entrega</a></li>
            <li><a href="perfil.html"><span class="icon"><img src="../../img/perfil.png"></span> Perfil</a></li>
            <li><a href="cerrar_sesion.html"><span class="icon"><img src="../../img/cerrar-seccion.png"></span> Cerrar sesión</a></li>
        </ul>
    </nav>

    <main class="content-area">
        <h1 class="h1-title">Crear Nueva Ruta</h1>
        <h3 class="subtitulo">Completa los datos de la ruta</h3>

        <form class="form-ruta" onsubmit="return false;">
    <label>ID de la ruta:</label>
    <input type="text" placeholder="Ej: R-010">

    <label>Conductor asignado:</label>
    <input type="text" placeholder="Nombre del conductor">

    <label>Vehículo:</label>
    <input type="text" placeholder="Ej: Camión A01">

    <label>Dirección o Zona:</label>
    <input type="text" placeholder="Ej: Calle 10 # 5-18, Barrio Centro">

    <label>Fecha de salida:</label>
    <input type="datetime-local">

    <label>Estado:</label>
    <select>
        <option>Activa</option>
        <option>Pendiente</option>
        <option>Cerrada</option>
    </select>

    <button type="submit" class="main-button">Guardar Ruta</button>
</form>

        <div class="logo-footer">Z-CONTAY</div>
    </main>

</div>

</body>
</html>
