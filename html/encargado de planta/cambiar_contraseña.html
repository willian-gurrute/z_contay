<header class="header-bar">
    <div class="header-rol">Encargado de planta</div>
    <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>

    <div class="header-user">
        <span class="icon"><img src="../../img/campana.png"></span>
        <span>Andres Imbachi</span>
        <span class="icon"><img src="../../img/usuario-gestion.png"></span>
    </div>
</header>

<div class="main-container">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <ul>
            <li><a href="panel_control.html"><span class="icon"><img src="../../img/panel.jpg"></span> Panel Principal</a></li>
            <li><a href="control_inventario.html"><span class="icon"><img src="../../img/inventario.png"></span> Control de inventario</a></li>
            <li><a href="movimiento_entrada_salida.html"><span class="icon"><img src="../../img/entrada-salida.png"></span> Movimiento Entrada/Salida</a></li>
            <li><a href="gestion_despachos.html"><span class="icon"><img src="../../img/despachos.png"></span> Gestión de Despachos</a></li>
            <li><a href="rutas_entrega.html"><span class="icon"><img src="../../img/rutas.png"></span> Rutas de Entrega</a></li>

        </ul>
    </nav>

    <!-- CONTENIDO -->
    <main class="content-area">

        <h1 class="h1-title titulo-contra">Cambiar Contraseña</h1>

        <div class="contra-card">

            <form class="contra-form">

                <label>Contraseña actual:</label>
                <input type="password" placeholder="Ingresa tu contraseña actual">

                <label>Nueva contraseña:</label>
                <input type="password" placeholder="Escribe una nueva contraseña">

                <label>Confirmar nueva contraseña:</label>
                <input type="password" placeholder="Repite la nueva contraseña">

                <div class="botones-contra">
                    <button type="button" class="btn-guardar" onclick="location.href='perfil.html'">
                        Guardar
                    </button>

                    <button type="button" class="btn-cancelar" onclick="location.href='perfil.html'">
                        Cancelar
                    </button>
                </div>

            </form>

        </div>

        <div class="logo-footer">Z-CONTAY</div>

    </main>

</div>

</body>
</html>
