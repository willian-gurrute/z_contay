<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cerrar sesión</title>
    <link rel="stylesheet" href="../../_css/cerrar-sesion.css">
</head>

<body>

    <!-- BARRA SUPERIOR -->
    <header class="header-bar">
        <div class="header-rol">Administrador</div>
        <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>

        <div class="header-user">
            <span class="icon"><img src="../../img/campana.png" alt=""></span>
            <span>Carlos Fernando Hurtado</span>
            <span class="icon"><img src="../../img/usuario-gestion.png" alt=""></span>
        </div>
    </header>

    <!-- CONTENIDO CENTRAL DE CONFIRMACIÓN -->
    <div class="confirm-container">

        <div class="confirm-box">
            <img src="../../img/cerrar-seccion.png" class="icono" alt="Salir">

            <h2>¿Deseas cerrar sesión?</h2>
            <p>Tu sesión actual se cerrará y volverás a la pantalla de inicio.</p>

            <div class="botones">
                <button class="btn-cancelar" onclick="location.href='panel-control.html'">
                    Cancelar
                </button>

                <button class="btn-salir" onclick="location.href='../login/inicio-seccion.html'">
                    Cerrar sesión
                </button>
            </div>
        </div>

    </div>

    <div class="logo-footer">Z-CONTAY</div>

</body>
</html>
