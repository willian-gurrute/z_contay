<!DOCTYPE html>

    <link rel="stylesheet" href="../../_css/admin-base.css">
    <link rel="stylesheet" href="../../_css/cliente-cambiar contraseña.css">
</head>

<body>

<header class="header-bar">
    <div class="header-rol">Cliente</div>
    <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>
    <div class="header-user">
        <span class="icon"><img src="../../img/campana.png" width="24"></span>
        <span>Juan Lopez</span>
        <span class="icon"><img src="../../img/perfil.png" width="24"></span>
    </div>
</header>

<div class="main-container">

    <!-- MENÚ LATERAL DEL CLIENTE -->
    <nav class="sidebar">
        <ul>
            <li><a href="portafolio.html"><span class="icon"><img src="../../img/panel.jpg"></span>Portafolio</a></li>
            <li><a href="realizar_pedido.html"><span class="icon"><img src="../../img/carrito.png"></span>Realizar pedido</a></li>
            <li><a href="historial_pedidos.html"><span class="icon"><img src="../../img/historial.png"></span>Historial de pedidos</a></li>

            <li><a href="cerrar_sesion.html"><span class="icon"><img src="../../img/cerrar-seccion.png"></span>Cerrar sesión</a></li>
        </ul>
    </nav>

    <main class="content-area">

        <h1 class="h1-title">Cambiar contraseña</h1>

        <form class="form-pass">

            <label>Contraseña actual:</label>
            <input type="password" placeholder="Ingresa tu contraseña actual">

            <label>Nueva contraseña:</label>
            <input type="password" placeholder="Mínimo 6 caracteres">

            <label>Confirmar nueva contraseña:</label>
            <input type="password" placeholder="Repite la nueva contraseña">

            <div class="pass-botones">
                <button class="btn-guardar">Guardar</button>
                <button type="button" class="btn-cancelar" onclick="location.href='perfil.html'">Cancelar</button>
            </div>

        </form>

        <div class="logo-footer">Z-CONTAY</div>

    </main>

</div>

</body>
</html>
