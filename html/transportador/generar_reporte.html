    </div>
</header>


<div class="main-container">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <ul>
            <li><a href="panel_principal.html"><span class="icon"><img src="../../img/panel.jpg"></span> Panel Principal</a></li>

            <li><a href="rutas_despachos.html"><span class="icon"><img src="../../img/despachos.png"></span> Rutas y despachos</a></li>

            <li><a href="registrar_entrega.html"><span class="icon"><img src="../../img/entrega.png"></span> Registrar entrega</a></li>

    <main class="content-area">

        <h1 class="h1-title">Generar Reporte</h1>

        <div class="reporte-card">

            <label for="tipo">Tipo de reporte</label>
            <select id="tipo">
                <option>Despachos entregados</option>
                <option>Despachos pendientes</option>
                <option>Despachos con incidencia</option>
                <option>Reporte general</option>
            </select>

            <label for="desde">Desde:</label>
            <input type="date" id="desde">

            <label for="hasta">Hasta:</label>
            <input type="date" id="hasta">

            <button class="btn-generar">Generar reporte</button>
        </div>

        <div class="logo-footer">Z-CONTAY</div>

    </main>
