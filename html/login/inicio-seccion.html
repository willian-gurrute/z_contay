<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Z-CONTAY - Galpón Aves del Paraíso</title>
    <link rel="stylesheet" href="../../_css/inicio-sesion.css">
</head>
<body>
    <h1 class="titulo-principal">Z-CONTAY - Galpón Aves del Paraíso</h1>

    <!-- Mensaje de éxito (se puede mostrar dinámicamente) -->
    <p class="success-msg" style="display:none;">Inicio de sesión exitoso</p>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        <form action="login.php" method="POST">
            <label for="correo_electronico">Correo electrónico:</label>
            <input type="email" id="correo_electronico" name="correo_electronico" placeholder="Ingrese su correo electrónico" required>

            <br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>

            <br><br>

            <button type="submit">Ingresar</button>
        </form>

        <!-- Mensaje de error dinámico -->
        <p class="error-msg" style="display:none;">Usuario o contraseña incorrectos</p>

        <!-- Enlaces -->
        <p style="text-align: center; margin-top:15px;">
            <a href="olvidastes_contraseña.html" class="link">¿Olvidaste tu contraseña?</a>
        </p>

        <p style="text-align:center;">
            <a href="crear_cuenta.html" class="link">¿Crear cuenta?</a>
        </p>
    </div>
</body>
</html>
