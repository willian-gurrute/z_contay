<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrar Entrega - Transportador</title>

    <link rel="stylesheet" href="../../_css/trasportador-rutas-despachos.css">
    <link rel="stylesheet" href="../../_css/trasportador-registrar-entrega.css">
</head>

<body>

    <!-- BARRA SUPERIOR -->
    <header class="header-bar">
        <div class="header-rol">Transportador</div>
        <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>

        <div class="header-user">
            <span class="icon">
                <img src="../../img/campana.png">
            </span>
            <span>Juan Transportador</span>
            <span class="icon">
                <img src="../../img/usuario-gestion.png">
            </span>
        </div>
    </header>

    <div class="main-container">

        <!-- MENÚ LATERAL -->
        <nav class="sidebar">
            <ul>
                <li><a href="panel_principal.html"><span class="icon"><img src="../../img/panel.jpg"></span> Panel Principal</a></li>

                <li><a href="rutas_despachos.html"><span class="icon"><img src="../../img/despachos.png"></span> Rutas y despachos</a></li>

                <li class="active-item"><a href="#"><span class="icon"><img src="../../img/entrega.png"></span> Registrar entrega</a></li>

                <li><a href="listado_pedidos.html"><span class="icon"><img src="../../img/listado-pedidos.png"></span> Listado de pedidos</a></li>

                <li><a href="reportes_despachos.html"><span class="icon"><img src="../../img/reportes.png"></span> Reportes de despachos</a></li>

                <li><a href="perfil.html"><span class="icon"><img src="../../img/perfil.png"></span> Perfil</a></li>

                <li><a href="cerrar_sesion.html"><span class="icon"><img src="../../img/cerrar-seccion.png"></span> Cerrar sesión</a></li>
            </ul>
        </nav>

        <!-- CONTENIDO -->
        <main class="content-area">

            <h1 class="h1-title">Registrar Entrega</h1>
            <h3 class="subtitulo">Confirmación de entrega al cliente</h3>

            <!-- FORMULARIO -->
            <form class="form-entrega">

                <label>Cliente:</label>
                <input type="text" placeholder="Ej: Juan López">

                <label>Dirección de entrega:</label>
                <input type="text" placeholder="Ej: Barrio Centro, Calle 10 #5-30">

                <label>Producto entregado:</label>
                <select>
                    <option>Huevo A</option>
                    <option>Huevo AA</option>
                    <option>Huevo AAA</option>
                    <option>Huevo Jumbo</option>
                </select>

                <label>Cantidad entregada:</label>
                <input type="number" placeholder="Ej: 60">

                <label>Observaciones:</label>
                <textarea placeholder="Notas adicionales..."></textarea>

                <button class="main-button" onclick="location.href='rutas_despachos.html'">
                    Confirmar Entrega
                </button>

            </form>

            <div class="logo-footer">Z-CONTAY</div>
        </main>

    </div>

</body>

</html>
