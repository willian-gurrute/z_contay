<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - Transportador</title>

    <link rel="stylesheet" href="../../_css/trasportador-rutas-despachos.css"> 
    <link rel="stylesheet" href="../../_css/cliente-editar perfil.css"> 
    <link rel="stylesheet" href="../../_css/trasportador-editar-perfil.css">
    
</head>

<body>

<header class="header-bar">
    <div class="header-rol">Transportador</div>
    <div class="header-system">Z-CONTAY - Galpón Aves del Paraíso</div>
    <div class="header-user">
        <span class="icon"><img src="../../img/campana.png" width="24" alt="Notificaciones"></span>
        <span>Juan Transportador</span>
        <span class="icon"><img src="../../img/perfil.png" width="24" alt="Perfil"></span>
    </div>
</header>

<div class="main-container">

    <nav class="sidebar">
        <ul>
            <li><a href="panel_principal.html"><span class="icon"><img src="../../img/panel.jpg" alt="Panel"></span> Panel Principal</a></li>
            <li><a href="rutas_despachos.html"><span class="icon"><img src="../../img/despachos.png" alt="Rutas"></span> Rutas y despachos</a></li>
            <li><a href="registrar_entrega.html"><span class="icon"><img src="../../img/entrega.png" alt="Entrega"></span> Registrar entrega</a></li>
            <li><a href="listado_pedidos.html"><span class="icon"><img src="../../img/listado-pedidos.png" alt="Pedidos"></span> Listado de pedidos</a></li>
            <li><a href="reportes_despachos.html"><span class="icon"><img src="../../img/reportes.png" alt="Reportes"></span> Reportes de despachos</a></li>
            <li class="active-item"><a href="perfil.html"><span class="icon"><img src="../../img/perfil.png" alt="Perfil"></span> Perfil</a></li>
            <li><a href="cerrar_sesion.html"><span class="icon"><img src="../../img/cerrar-seccion.png" alt="Cerrar"></span>Cerrar sesión</a></li>
        </ul>
    </nav>

    <main class="content-area">

        <h1 class="h1-title">Editar Perfil</h1>

        <div class="perfil-wrapper">
            <div class="perfil-card">
                
                <form class="perfil-form">
                    
                    <div class="form-group-simple">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" value="Juan Transportador">
                    </div>

                    <label>Documento de identificación:</label>
                    <input type="text" value="1025896471">
                    
                    <div class="form-group-simple">
                        <label for="correo">Correo electrónico:</label>
                        <input type="email" id="correo" value="transportador@zcontay.com">
                    </div>

                    <div class="form-group-simple">
                        <label for="telefono">Teléfono:</label>
                        <input type="text" id="telefono" value="312 456 7890">
                    </div>

                    <div class="form-group-simple">
                        <label for="direccion">Dirección:</label>
                        <input type="text" id="direccion" value="Calle 10 #5-20 – Barrio Centro">
                    </div>

                    <div class="perfil-botones">
                        <button class="btn-guardar" type="button">Guardar cambios</button>
                        <button class="btn-cancelar" onclick="location.href='perfil.html'" type="button">Cancelar</button>
                    </div>

                </form>

            </div>
        </div>

        <div class="logo-footer">Z-CONTAY</div>

    </main>
</div>

</body>
</html>
